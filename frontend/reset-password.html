<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — CampusPulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0a0a0f;
            padding: 20px;
        }

        .reset-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: var(--r-xl);
            box-shadow: 0 32px 80px rgba(0, 0, 0, .6);
            border: 1px solid rgba(168, 85, 247, .2);
        }

        .form-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }

        .form-sub {
            font-size: 0.875rem;
            color: var(--clr-text-muted);
            margin-bottom: 24px;
            text-align: center;
        }

        .form-field {
            margin-bottom: 16px;
        }

        .btn-submit {
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div id="toastContainer" class="toast-container"></div>

    <div class="reset-container glass">
        <div class="auth-brand" style="text-align: center; font-size: 1.4rem; margin-bottom: 8px;">⚡ CampusPulse</div>
        <h2 class="form-title">Reset Password</h2>
        <p class="form-sub" id="statusMessage">Set a new secure password for your account</p>

        <form id="resetForm" style="display: block;">
            <div class="form-field">
                <label>New Password</label>
                <input type="password" class="input-field" id="resetPass" placeholder="Min 8 characters" required />
            </div>
            <div class="form-field">
                <label>Confirm Password</label>
                <input type="password" class="input-field" id="resetConfirm" placeholder="Repeat password" required />
            </div>
            <button type="submit" class="btn btn-primary full-width btn-submit" id="resetSubmitBtn">Update
                Password</button>
        </form>

        <p class="auth-switch" style="margin-top: 20px;"><a href="index.html" class="link-text">← Back to
                CampusPulse</a></p>
    </div>

    <script src="services/api.js"></script>
    <script>
        // Simple Toast helper
        function showToast(type = "info", title = "", message = "") {
            const icons = { success: "✅", error: "❌", info: "ℹ️", warning: "⚠️" };
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${icons[type]}</span>
                <div class="toast-body">
                    <div class="toast-title">${title}</div>
                    ${message ? `<div class="toast-msg">${message}</div>` : ""}
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add("removing");
                toast.addEventListener("animationend", () => toast.remove());
            }, 4000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const email = urlParams.get('email');

            if (!token || !email) {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('statusMessage').textContent = 'Invalid or missing password reset parameters. Please request a new password reset link.';
                document.getElementById('statusMessage').style.color = 'var(--clr-red)';
                showToast('error', 'Error', 'Invalid reset token link.');
                return;
            }

            const form = document.getElementById('resetForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('resetPass').value;
                const confirm = document.getElementById('resetConfirm').value;

                if (password.length < 8) {
                    showToast('error', 'Weak password', 'Password must be at least 8 characters long.');
                    return;
                }

                if (password !== confirm) {
                    showToast('error', 'Mismatch', 'Passwords do not match.');
                    return;
                }

                try {
                    const submitBtn = document.getElementById('resetSubmitBtn');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Updating...';

                    const res = await API.resetPassword(email, token, password);

                    showToast('success', 'Success!', 'Password updated. Redirecting to homepage...');

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2500);
                } catch (err) {
                    showToast('error', 'Failed', err.message);
                    document.getElementById('resetSubmitBtn').disabled = false;
                    document.getElementById('resetSubmitBtn').textContent = 'Update Password';
                }
            });
        });
    </script>
</body>

</html>
